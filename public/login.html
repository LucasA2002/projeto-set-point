<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="js/sessao.js"></script>
</head>

<body>
    <!-- Background -->
    <div class="background">

        <!-- Card Erro -->
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="card">

            <!-- Header do Card -->
            <div class="card-header">
                <div class="logo"></div>
            </div>

            <!-- Body do Card -->
            <div class="card-body">
                <!-- Formulario -->
                <div class="formulario">
                    <p>Email:</p>
                    <input type="text" placeholder="nome@email.com" id="ipt_email" required>

                    <p>Senha:</p>
                    <input type="password" placeholder="Sua senha" id="ipt_senha" required>

                    <!-- Botao de Login -->
                    <button class="btn-entrar" type="button" onclick="entrar()">
                        Entrar
                    </button>

                    <!-- Gif de Loading -->
                    <div id="div_aguardar" class="loading-div">
                        <img src="assets/imgs/loading-green-loading.gif" id="loading-gif">
                    </div>

                    <!-- Link para Cadastro -->
                    <p class="link-login">
                        Não tem uma conta? <a href="cadastro.html">Criar conta</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function limparFormulario() {
            ipt_email.value = ""
            ipt_senha.value = ""
        }
    
        function entrar() {
            aguardar();
    
            var emailVar = ipt_email.value;
            var senhaVar = ipt_senha.value;
    
            if (emailVar == "" || senhaVar == "") {
                cardErro.style.display = "block"
                mensagem_erro.innerHTML =
                    `<h1>Atenção!</h1>
                    <p>Preencha todos os campos para efetuar o login.</p>`;
                finalizarAguardar();
                return false;
            }
            else {
                setInterval(sumirMensagem, 5000)
            }
    
            console.log("FORM LOGIN: ", emailVar);
            console.log("FORM SENHA: ", senhaVar);
    
            fetch("/usuarios/autenticar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    emailServer: emailVar,
                    senhaServer: senhaVar
                })
            }).then(function (resposta) {
                console.log("ESTOU NO THEN DO entrar()!")
    
                if (resposta.ok) {
                    console.log(resposta);
    
                    resposta.json().then(json => {
                        console.log(json);
                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id_usuario;
                        console.log("Sessão:", sessionStorage.ID_USUARIO, sessionStorage.EMAIL_USUARIO);
    
                        setTimeout(function () {
                            window.location.href = "/dashboard/grupos.html";
                            limparFormulario();
                            finalizarAguardar();
                        }, 1000); // apenas para exibir o loading
                    });
    
                } else {
    
                    console.log("Houve um erro ao tentar realizar o login!");
    
                    resposta.text().then(texto => {
                        console.error(texto);
                        finalizarAguardar(texto);
                    });
                }
    
            }).catch(function (erro) {
                console.log(erro);
            })
    
            return false;
        }
    
        function sumirMensagem() {
            cardErro.style.display = "none"
        }
    
    </script>
</body>
</html>

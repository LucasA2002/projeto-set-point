<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/cadastro.css">
    <script src="./js/sessao.js"></script>
</head>

<body>
    <div class="background">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <div class="logo"></div>
            </div>
            <div class="card-body">
                <div class="formulario">
                    <p>Nome Completo:</p>
                    <input type="text" placeholder="Digite o seu Nome Completo" name="nome" id="ipt_nome" required>

                    <p>Data de Nascimento:</p>
                    <input type="date" placeholder="dd/mm/aaaa" name="" id="ipt_dtNasc" required>

                    <div class="selects">
                        <div class="select-genero">
                            <p>Gênero:</p>
                            <select name="genero" id="slt_genero" required>
                                <option value="" selected disabled>Selecione</option>
                                <option value="masculino">Masculino</option>
                                <option value="feminino">Feminino</option>
                                <option value="nao_binario">Não-Binário</option>
                                <option value="nao_informado">Prefiro não responder</option>
                            </select>
                        </div>
                        <div class="select-nivel">
                            <p>Nível de Jogo:</p>
                            <select name="nivel" id="slt_nivel" required>
                                <option value="" selected disabled>Selecione</option>
                                <option value="iniciante">Iniciante</option>
                                <option value="intermediario">Intermediário</option>
                                <option value="avancado">Avançado</option>
                            </select>
                        </div>
                    </div>

                    <p>Email:</p>
                    <input type="email" placeholder="nome@email.com" name="email" id="ipt_email" required>

                    <p>Senha:</p>
                    <input oninput="validar()" type="password" placeholder="Sua Senha" name="senha" id="ipt_senha" required>
                    <div id="validacao" class="validacao"></div>

                    <p>Confirme a sua Senha:</p>
                    <input type="password" placeholder="Confirme Sua Senha" name="senhaConf" id="ipt_senhaConf"
                        required>

                    <button class="btn-cadastrar" type="button" onclick="cadastrar()">
                        Criar conta
                    </button>

                    <div id="div_aguardar" class="loading-div">
                        <img src="./assets/imgs/loading-green-loading.gif" id="loading-gif" />
                    </div>

                    <p class="link-login">
                        Já tem uma conta? <a href="login.html">Fazer login</a>
                    </p>

                </div>
            </div>
        </div>
    </div>
</body>

</html>
<script>
    function limparFormulario() {
        ipt_nome.value = ""
        ipt_dtNasc.value = ""
        slt_genero.value = ""
        slt_nivel.value = ""
        ipt_email.value = ""
        ipt_senha.value = ""
        ipt_senhaConf.value = ""
    }

    function validar() {
        let senha = ipt_senha.value
        let senhaConfirmada = ipt_senhaConf.value
        let tamanho = senha.length
        let senhaMaiuscula = senha.toUpperCase()
        let senhaMinuscula = senha.toLowerCase()
        let especial = ['!', '@', '#', '$', '%', '&', '*', '~', ';', '.', ',', '/', '+', '-', '=', '|']
        let temEspecial = false
        let validacaoFeita = false


        if (tamanho < 8) {
            validacao.innerHTML = `A senha precisa ter no mínimo 8 caracteres`
        } else if (senha == senhaMaiuscula) {
            validacao.innerHTML = 'A senha precisa conter ao menos uma letra minúscula'
        } else if (senha == senhaMinuscula) {
            validacao.innerHTML = 'A senha precisa conter ao menos uma letra maiúscula'
        } else {
            for (let i = 0; i < tamanho; i++) {
                if (especial.includes(senha[i])) {
                    temEspecial = true;
                    break;
                }
            }

            if (!temEspecial) {
                validacao.innerHTML = 'A senha precisa ter pelo menos um caractere especial'
            } else {
                validacao.innerHTML = ``
                validacaoFeita = true
            }
        }

        return validacaoFeita;
    }

    function cadastrar() {
        aguardar();

        let nomeVar = ipt_nome.value;
        let nascVar = ipt_dtNasc.value;
        let generoVar = slt_genero.value;
        let nivelVar = slt_nivel.value;
        let emailVar = ipt_email.value;
        let senhaVar = ipt_senha.value;
        let confirmacaoSenhaVar = ipt_senhaConf.value;
        let verificacaoArroba = emailVar.indexOf('@')
        let verificacaoPonto = emailVar.indexOf('.')

        var validacaoFeita = validar();

        // Verificando se há algum campo em branco
        if (
            nomeVar == "" ||
            nascVar == "" ||
            generoVar == "" ||
            nivelVar == "" ||
            emailVar == "" ||
            senhaVar == "" ||
            confirmacaoSenhaVar == ""
        ) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML =
                `<h1>Atenção!</h1>
                <p>Para realizar o cadastro você deve preencher todos os campos.</p>`;

            finalizarAguardar();
            return false;
        } else {
            if (verificacaoArroba == -1 || verificacaoPonto == -1) {
                cardErro.style.display = "block";
                mensagem_erro.innerHTML =
                    `<h1>Atenção!</h1>
                    <p>Insira um email válido.</p>`;
                finalizarAguardar();
                return false;
            } else if (senhaVar != confirmacaoSenhaVar){
                cardErro.style.display = "block";
                mensagem_erro.innerHTML =
                    `<h1>Atenção!</h1>
                    <p>As senhas não se coincidem.</p>`;
                finalizarAguardar();
                return false;
            } else if (!validacaoFeita){
                cardErro.style.display = "block";
                mensagem_erro.innerHTML =
                    `<h1>Atenção!</h1>
                    <p>A senha deve cumprir os requisitos</p>`;
                finalizarAguardar();
                return false;
            } else {
                // Enviando o valor da nova input
                fetch("/usuarios/cadastrar", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        // crie um atributo que recebe o valor recuperado aqui
                        // Agora vá para o arquivo routes/usuario.js
                        nomeServer: nomeVar,
                        nascServer: nascVar,
                        generoServer: generoVar,
                        nivelServer: nivelVar,
                        emailServer: emailVar,
                        senhaServer: senhaVar,
                        senhaConfServer: confirmacaoSenhaVar
                    }),
                })
                    .then(function (resposta) {
                        console.log("resposta: ", resposta);
        
                        if (resposta.ok) {
                            cardErro.style.display = "block";
        
                            mensagem_erro.innerHTML =
                                `<h1>Cadastro realizado com sucesso!</h1>
                                <p>Redirecionando para tela de Login...</p>`;
        
                            setTimeout(() => {
                                window.location = "login.html";
                                limparFormulario();
                                finalizarAguardar();
                            }, "2000");
        
                        } else {
                            throw "Houve um erro ao tentar realizar o cadastro!";
                        }
                    })
                    .catch(function (resposta) {
                        console.log(`#ERRO: ${resposta}`);
                        finalizarAguardar();
                    });
        
                return false;
            }
        }
    }

</script>
